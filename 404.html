<!DOCTYPE html>
<!-- ============================================================
     404 — served by GitHub Pages for any unknown path.
     Absolute (/) asset paths so it renders at any URL depth.
     ============================================================ -->
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="/favicon-32.png" sizes="32x32" type="image/png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <meta name="theme-color" content="#3A5E7A">
  <meta name="robots" content="noindex">
  <title>Страница не найдена — Юлия, лайф-коуч</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">

  <style>
    .nf { min-height: 100dvh; display: flex; align-items: center; justify-content: center;
          text-align: center; padding: 2rem; }
    .nf__inner { max-width: 32rem; }
    .nf__code { font-family: var(--font-head); font-style: italic; font-weight: 500;
                font-size: clamp(4rem, 14vw, 7rem); line-height: 1; color: var(--color-accent);
                margin: 0 0 .5rem; }
    .nf__title { font-family: var(--font-head); font-weight: 500;
                 font-size: clamp(1.5rem, 4vw, 2.1rem); color: var(--color-primary); margin: 0 0 1rem; }
    .nf__lead { color: var(--color-muted); line-height: 1.6; margin: 0 0 2rem; }
    .nf__home { display: inline-flex; }
    .nf__langs { margin-top: 1.6rem; font-size: .85rem; letter-spacing: .04em; color: var(--color-muted); }
    .nf__langs a { color: var(--color-primary); text-decoration: none; }
    .nf__langs a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main class="nf">
    <div class="nf__inner">
      <p class="nf__code">404</p>
      <h1 class="nf__title">Этой страницы здесь нет</h1>
      <p class="nf__lead">Возможно, ссылка устарела или адрес введён с опечаткой.
        Давайте вернёмся туда, где спокойно и понятно.</p>
      <a class="btn btn--primary nf__home" href="/">На главную</a>
      <p class="nf__langs">
        <a href="/">RU</a> · <a href="/lt/">LT</a> · <a href="/en/">EN</a>
      </p>
    </div>
  </main>
</body>
</html>
